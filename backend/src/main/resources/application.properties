# Server Configuration
server.port=${PORT:8080}
spring.application.name=arribot-backend

# MongoDB Atlas Configuration — set MONGODB_URI env var
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=arribot
spring.data.mongodb.auto-index-creation=true

# Groq AI Configuration — set GROQ_API_KEY env var
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}

# Gemini (retained as bean; not used for AI calls) — set GEMINI_API_KEY env var
gemini.api.key=${GEMINI_API_KEY:placeholder}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
gemini.model=gemini-2.0-flash

# CORS Configuration
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.arribot=INFO
logging.level.org.springframework.data.mongodb=DEBUG

# Brevo Email Configuration — set BREVO_API_KEY, BREVO_FROM_EMAIL env vars
brevo.api.key=${BREVO_API_KEY}
brevo.from.email=${BREVO_FROM_EMAIL}
brevo.from.name=ArriBot

# JWT Configuration — set JWT_SECRET env var
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Upload Configuration
file.upload.dir=${FILE_UPLOAD_DIR:./uploads/resumes}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true

# AI Usage Limits (per user per day)
ai.limits.chat.daily=30
ai.limits.flashcards.daily=10
ai.limits.quiz.daily=5
ai.limits.summary.daily=10

# Rate Limiting (per user per minute)
ai.ratelimit.requests.per.minute=5
ai.ratelimit.window.seconds=60

# Global AI Control
ai.enabled=true
